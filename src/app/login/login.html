
<form action=""  #myForm="ngForm" (ngSubmit)="log(myForm)">
  <input #email="ngModel" type="email" name="email" ngModel   [(ngModel)]="loginObj.email"  email required/>
  
    @if(!email.valid){
     <p style="color:red">email is not correct format</p>
    }

  <input type="password" name="password"   ngModel  [(ngModel)]="loginObj.password" minlength="8" required/>

  <button [disabled]="myForm.invalid">login</button>
</form>
